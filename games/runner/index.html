<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endless Runner – Games4Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="game-page">
  <a href="../../" class="back-btn">← Zurück</a>
  <h1 class="game-title">🏃 Endless Runner</h1>
  <p class="score-display">Score: <span id="score">0</span></p>
  <canvas id="canvas"></canvas>
  <p class="hint" id="hint">Tippe / Leertaste zum Starten & Springen</p>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hintEl  = document.getElementById('hint');

    const H = 160, GROUND = 120;
    let W;

    function resize() {
      W = Math.min(window.innerWidth - 32, 480);
      canvas.width  = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    let player, obstacles, score, speed, frameCount, running, started, animId;

    function init() {
      player    = { x: 50, y: GROUND, w: 28, h: 32, vy: 0, onGround: true };
      obstacles = [];
      score     = 0;
      speed     = 4;
      frameCount = 0;
      scoreEl.textContent = 0;
    }

    function jump() {
      if (!started) { start(); return; }
      if (player.onGround) { player.vy = -11; player.onGround = false; }
    }

    function spawnObstacle() {
      const h = 24 + Math.random() * 28;
      obstacles.push({ x: W, y: GROUND + 32 - h, w: 18, h });
    }

    function update() {
      frameCount++;
      score++;
      scoreEl.textContent = Math.floor(score / 6);
      speed = 4 + Math.floor(score / 300) * 0.5;

      // Player physics
      player.vy += 0.55;
      player.y  += player.vy;
      if (player.y >= GROUND) { player.y = GROUND; player.vy = 0; player.onGround = true; }

      // Spawn
      const gap = Math.max(60, 120 - Math.floor(score / 200) * 5);
      if (frameCount % gap === 0) spawnObstacle();

      // Move obstacles
      obstacles.forEach(o => o.x -= speed);
      obstacles = obstacles.filter(o => o.x + o.w > 0);

      // Collision
      for (const o of obstacles) {
        if (player.x + player.w - 4 > o.x + 4 &&
            player.x + 4 < o.x + o.w - 4 &&
            player.y + player.h - 4 > o.y + 4) {
          gameOver(); return;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#0d0d1a');
      sky.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      // Ground
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(0, GROUND + 32, W, H - GROUND - 32);
      ctx.fillStyle = '#7b2fff';
      ctx.fillRect(0, GROUND + 32, W, 3);

      // Player (character)
      ctx.fillStyle = '#7b2fff';
      ctx.beginPath();
      ctx.roundRect(player.x, player.y, player.w, player.h, 6);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(player.x + player.w - 8, player.y + 8, 4, 0, Math.PI * 2);
      ctx.fill();

      // Obstacles
      obstacles.forEach(o => {
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.roundRect(o.x, o.y, o.w, o.h, 4);
        ctx.fill();
      });

      // Score HUD
      ctx.fillStyle = 'rgba(0,212,255,0.8)';
      ctx.font = "8px 'Press Start 2P'";
      ctx.textAlign = 'left';
      ctx.fillText(`${Math.floor(score / 6)}m`, 8, 18);
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function start() {
      cancelAnimationFrame(animId);
      init();
      running = true; started = true;
      hintEl.textContent = '';
      draw();
      animId = requestAnimationFrame(loop);
    }

    function gameOver() {
      running = false;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = "14px 'Press Start 2P'";
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 16);
      ctx.font = "8px 'Press Start 2P'";
      ctx.fillText(`${Math.floor(score / 6)}m`, W / 2, H / 2 + 8);
      ctx.fillText('Nochmal tippen', W / 2, H / 2 + 28);
      hintEl.textContent = 'Tippe zum Neustart';
      started = false;
    }

    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
    canvas.addEventListener('click', jump);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

    init(); draw();
  </script>
</body>
</html>
