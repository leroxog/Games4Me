<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake – Games4Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    /* Keyboard hint — nur auf Desktop sichtbar */
    .key-hint {
      display: none;
      gap: 6px;
      margin-top: 1rem;
      flex-direction: column;
      align-items: center;
    }
    @media (hover: hover) and (pointer: fine) {
      .key-hint { display: flex; }
    }
    .key-row { display: flex; gap: 6px; }
    .key {
      width: 42px; height: 42px;
      background: #1a1a2e;
      border: 2px solid #7b2fff;
      border-bottom-width: 4px;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .key.active {
      border-color: #00d4ff;
      color: #00d4ff;
      transform: translateY(2px);
      border-bottom-width: 2px;
    }
  </style>
</head>
<body class="game-page">
  <a href="../../" class="back-btn">← Zurück</a>
  <h1 class="game-title">🐍 Snake</h1>
  <p class="score-display">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></p>
  <canvas id="canvas"></canvas>
  <p class="hint" id="hint">Wische / Drücke eine Taste zum Starten</p>

  <!-- Visuelle Tastatur-Anzeige (nur Desktop) -->
  <div class="key-hint" aria-hidden="true">
    <div class="key-row">
      <div class="key" id="key-w">W</div>
      <div class="key" id="key-up">▲</div>
    </div>
    <div class="key-row">
      <div class="key" id="key-a">A</div>
      <div class="key" id="key-s">S</div>
      <div class="key" id="key-d">D</div>
      <div class="key" style="visibility:hidden"></div>
      <div class="key" id="key-left">◀</div>
      <div class="key" id="key-down">▼</div>
      <div class="key" id="key-right">▶</div>
    </div>
  </div>

  <script type="module">
    import { createSnake, placeFood, step, isOpposite } from './logic.js';

    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const hintEl  = document.getElementById('hint');

    const CELL = 20;
    let cols, rows, size;

    function resize() {
      size = Math.min(window.innerWidth - 32, 400);
      size = Math.floor(size / CELL) * CELL;
      canvas.width  = size;
      canvas.height = size;
      cols = size / CELL;
      rows = size / CELL;
    }
    resize();
    window.addEventListener('resize', () => { resize(); if (!running) draw(); });

    let snake, dir, nextDir, food, score, best = 0, running = false, started = false, loop;

    function init() {
      snake   = createSnake(cols, rows);
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      food    = placeFood(snake, cols, rows);
      scoreEl.textContent = 0;
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#7b2fff' : '#a855f7';
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function tick() {
      dir = { ...nextDir };
      const result = step(snake, dir, food, cols, rows);
      if (result.gameOver) { gameOver(); return; }
      snake = result.snake;
      food  = result.food;
      if (result.ateFood) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
      }
      draw();
    }

    function gameOver() {
      running = false;
      clearInterval(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${CELL}px 'Press Start 2P'`;
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - CELL);
      ctx.font = `${CELL * 0.6}px 'Press Start 2P'`;
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + CELL);
      ctx.font = `${CELL * 0.5}px 'Press Start 2P'`;
      ctx.fillText('Nochmal wischen', canvas.width / 2, canvas.height / 2 + CELL * 2.5);
      hintEl.textContent = 'Wische / Drücke zum Neustart';
      started = false;
    }

    function start() {
      if (running) return;
      init();
      running = true;
      started = true;
      hintEl.textContent = '';
      loop = setInterval(tick, 150);
    }

    function applyDir(d) {
      if (!started) { start(); }
      if (!isOpposite(dir, d)) nextDir = d;
    }

    // ── Tastatur ────────────────────────────────────────────────────
    const keyMap = {
      ArrowUp:    { x: 0, y: -1 }, ArrowDown:  { x: 0, y:  1 },
      ArrowLeft:  { x: -1, y: 0 }, ArrowRight: { x: 1, y:  0 },
      w: { x: 0, y: -1 }, s: { x: 0, y:  1 },
      a: { x: -1, y: 0 }, d: { x: 1, y:  0 },
    };
    const keyEls = {
      ArrowUp: 'key-up', ArrowDown: 'key-down',
      ArrowLeft: 'key-left', ArrowRight: 'key-right',
      w: 'key-w', s: 'key-s', a: 'key-a', d: 'key-d',
    };

    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      const d = keyMap[e.key];
      if (!d) return;
      applyDir(d);
      document.getElementById(keyEls[e.key])?.classList.add('active');
    });
    document.addEventListener('keyup', e => {
      document.getElementById(keyEls[e.key])?.classList.remove('active');
    });

    // ── Touch / Swipe ───────────────────────────────────────────────
    let touchStartX = null, touchStartY = null;

    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      if (!started) start();
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      if (touchStartX === null) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;

      // Mindest-Schwelle damit kleine Zitterer ignoriert werden
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;

      if (Math.abs(dx) >= Math.abs(dy)) {
        applyDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
      } else {
        applyDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      }

      // Reset damit jede neue Wischbewegung zählt
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', () => {
      touchStartX = null;
      touchStartY = null;
    }, { passive: true });

    init();
  </script>
</body>
</html>
