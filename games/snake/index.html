<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake – Games4Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="game-page">
  <a href="../../" class="back-btn">← Zurück</a>
  <h1 class="game-title">🐍 Snake</h1>
  <p class="score-display">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></p>
  <canvas id="canvas"></canvas>
  <p class="hint" id="hint">Wische / Drücke eine Taste zum Starten</p>

  <script type="module">
    import { createSnake, placeFood, step, isOpposite } from './logic.js';

    // ── Audio (Web Audio API, keine Dateien nötig) ───────────────────
    let _ac = null;
    function ac() {
      if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }
    function tone(freq, type, dur, vol = 0.22, delay = 0) {
      try {
        const ctx = ac(), t = ctx.currentTime + delay;
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.02);
      } catch (_) {}
    }
    function noise(dur, vol = 0.35, delay = 0, cutoff = 1800) {
      try {
        const ctx = ac(), t = ctx.currentTime + delay;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        const filt = ctx.createBiquadFilter();
        const g = ctx.createGain();
        src.buffer = buf; filt.type = 'lowpass';
        filt.frequency.setValueAtTime(cutoff, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        src.connect(filt); filt.connect(g); g.connect(ctx.destination);
        src.start(t); src.stop(t + dur + 0.02);
      } catch (_) {}
    }

    function sndEat() {
      tone(523, 'square', 0.07, 0.2);
      tone(784, 'square', 0.09, 0.2, 0.07);
    }
    function sndStart() {
      tone(330, 'square', 0.06, 0.15);
      tone(440, 'square', 0.07, 0.15, 0.07);
      tone(523, 'square', 0.09, 0.15, 0.14);
    }
    function sndDie() {
      tone(300, 'sawtooth', 0.18, 0.28);
      tone(200, 'sawtooth', 0.22, 0.28, 0.16);
      tone(130, 'sawtooth', 0.38, 0.28, 0.34);
      noise(0.12, 0.2, 0.34, 300);
    }

    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const hintEl  = document.getElementById('hint');

    const CELL = 20;
    let cols, rows, size;

    function resize() {
      size = Math.min(window.innerWidth - 32, 400);
      size = Math.floor(size / CELL) * CELL;
      canvas.width  = size;
      canvas.height = size;
      cols = size / CELL;
      rows = size / CELL;
    }
    resize();
    window.addEventListener('resize', () => { resize(); if (!running) draw(); });

    let snake, dir, nextDir, food, score, best = 0, running = false, started = false, loop;

    function init() {
      snake   = createSnake(cols, rows);
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      food    = placeFood(snake, cols, rows);
      scoreEl.textContent = 0;
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#7b2fff' : '#a855f7';
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function tick() {
      dir = { ...nextDir };
      const result = step(snake, dir, food, cols, rows);
      if (result.gameOver) { sndDie(); gameOver(); return; }
      snake = result.snake;
      food  = result.food;
      if (result.ateFood) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        sndEat();
      }
      draw();
    }

    function gameOver() {
      running = false;
      clearInterval(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${CELL}px 'Press Start 2P'`;
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - CELL);
      ctx.font = `${CELL * 0.6}px 'Press Start 2P'`;
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + CELL);
      ctx.font = `${CELL * 0.5}px 'Press Start 2P'`;
      ctx.fillText('Nochmal wischen', canvas.width / 2, canvas.height / 2 + CELL * 2.5);
      hintEl.textContent = 'Wische / Drücke zum Neustart';
      started = false;
    }

    function start() {
      if (running) return;
      init();
      running = true;
      started = true;
      hintEl.textContent = '';
      sndStart();
      loop = setInterval(tick, 150);
    }

    function applyDir(d) {
      if (!started) { start(); }
      if (!isOpposite(dir, d)) nextDir = d;
    }

    // ── Tastatur ────────────────────────────────────────────────────
    const keyMap = {
      ArrowUp:    { x: 0, y: -1 }, ArrowDown:  { x: 0, y:  1 },
      ArrowLeft:  { x: -1, y: 0 }, ArrowRight: { x: 1, y:  0 },
      w: { x: 0, y: -1 }, s: { x: 0, y:  1 },
      a: { x: -1, y: 0 }, d: { x: 1, y:  0 },
    };
    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      const d = keyMap[e.key];
      if (!d) return;
      applyDir(d);
    });

    // ── Touch / Swipe ───────────────────────────────────────────────
    let touchStartX = null, touchStartY = null;

    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      if (!started) start();
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      if (touchStartX === null) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;

      // Mindest-Schwelle damit kleine Zitterer ignoriert werden
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;

      if (Math.abs(dx) >= Math.abs(dy)) {
        applyDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
      } else {
        applyDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      }

      // Reset damit jede neue Wischbewegung zählt
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', () => {
      touchStartX = null;
      touchStartY = null;
    }, { passive: true });

    init();
  </script>
</body>
</html>
