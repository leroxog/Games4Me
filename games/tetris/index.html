<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris – Games4Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="game-page">
  <a href="../../" class="back-btn">← Zurück</a>
  <h1 class="game-title">🟦 Tetris</h1>
  <p class="score-display">Score: <span id="score">0</span> &nbsp;|&nbsp; Level: <span id="level">1</span></p>
  <canvas id="canvas"></canvas>
  <p class="hint" id="hint">Tippe / Drücke eine Taste zum Starten</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const hintEl  = document.getElementById('hint');

    const COLS = 10, ROWS = 20;
    let CELL;

    function resize() {
      CELL = Math.min(Math.floor((window.innerWidth - 32) / COLS), 28);
      canvas.width  = COLS * CELL;
      canvas.height = ROWS * CELL;
    }
    resize();
    window.addEventListener('resize', () => { resize(); drawBoard(); });

    const COLORS = ['', '#7b2fff','#00d4ff','#f59e0b','#10b981','#ef4444','#3b82f6','#ec4899'];
    const PIECES = [
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[0,4,4],[4,4,0]],
      [[5,5,0],[0,5,5]],
      [[6,0,0],[6,6,6]],
      [[0,0,7],[7,7,7]],
    ];

    let board, piece, pieceX, pieceY, score, level, lines, running, started, loop;

    function newBoard() {
      return Array.from({length: ROWS}, () => Array(COLS).fill(0));
    }

    function newPiece() {
      const shape = PIECES[Math.floor(Math.random() * PIECES.length)];
      piece  = shape.map(r => [...r]);
      pieceX = Math.floor((COLS - piece[0].length) / 2);
      pieceY = 0;
      if (collides(piece, pieceX, pieceY)) gameOver();
    }

    function collides(p, px, py) {
      for (let r = 0; r < p.length; r++)
        for (let c = 0; c < p[r].length; c++)
          if (p[r][c] && (py+r >= ROWS || px+c < 0 || px+c >= COLS || board[py+r][px+c]))
            return true;
      return false;
    }

    function rotate(p) {
      return p[0].map((_, i) => p.map(r => r[i]).reverse());
    }

    function merge() {
      piece.forEach((r, ri) => r.forEach((v, ci) => { if (v) board[pieceY+ri][pieceX+ci] = v; }));
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(v => v)) {
          board.splice(r, 1);
          board.unshift(Array(COLS).fill(0));
          cleared++;
          r++;
        }
      }
      if (cleared) {
        const pts = [0,100,300,500,800];
        score += (pts[cleared] || 800) * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        scoreEl.textContent = score;
        levelEl.textContent = level;
      }
    }

    function drop() {
      pieceY++;
      if (collides(piece, pieceX, pieceY)) {
        pieceY--;
        merge();
        clearLines();
        newPiece();
      }
      drawBoard();
    }

    function hardDrop() {
      while (!collides(piece, pieceX, pieceY + 1)) pieceY++;
      drop();
    }

    function tryRotate() {
      const r = rotate(piece);
      if (!collides(r, pieceX, pieceY)) { piece = r; drawBoard(); }
    }

    function drawBoard() {
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 0.5;
      for (let r = 0; r < ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(canvas.width, r*CELL); ctx.stroke();
      }
      for (let c = 0; c < COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, canvas.height); ctx.stroke();
      }

      // Placed blocks
      board.forEach((row, r) => row.forEach((v, c) => {
        if (v) drawCell(c, r, COLORS[v]);
      }));

      // Ghost piece
      let ghostY = pieceY;
      while (!collides(piece, pieceX, ghostY + 1)) ghostY++;
      piece.forEach((row, r) => row.forEach((v, c) => {
        if (v) {
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.fillRect((pieceX+c)*CELL+1, (ghostY+r)*CELL+1, CELL-2, CELL-2);
        }
      }));

      // Active piece
      piece.forEach((row, r) => row.forEach((v, c) => {
        if (v) drawCell(pieceX+c, pieceY+r, COLORS[v]);
      }));
    }

    function drawCell(c, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2, 3);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(c*CELL+2, r*CELL+2, CELL/3, CELL/3);
    }

    function gameOver() {
      running = false;
      clearInterval(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${CELL}px 'Press Start 2P'`;
      ctx.textAlign = 'center';
      ctx.fillText('GAME', canvas.width/2, canvas.height/2 - CELL*1.5);
      ctx.fillText('OVER', canvas.width/2, canvas.height/2 - CELL*0.2);
      ctx.font = `${CELL*0.55}px 'Press Start 2P'`;
      ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + CELL*1.2);
      ctx.fillText('Nochmal tippen', canvas.width/2, canvas.height/2 + CELL*2.5);
      hintEl.textContent = 'Tippe / Drücke zum Neustart';
      started = false;
    }

    function startGame() {
      if (running) return;
      board   = newBoard();
      score   = 0; lines = 0; level = 1;
      scoreEl.textContent = 0; levelEl.textContent = 1;
      running = true; started = true;
      hintEl.textContent = '';
      newPiece();
      drawBoard();
      clearInterval(loop);
      loop = setInterval(() => { drop(); }, getSpeed());
    }

    function getSpeed() { return Math.max(80, 500 - (level - 1) * 40); }

    function resetTimer() {
      clearInterval(loop);
      loop = setInterval(() => { drop(); }, getSpeed());
    }

    // ── Tastatur ────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (!started) { startGame(); return; }
      if (!running) return;
      if (e.key === 'ArrowLeft')  { if (!collides(piece, pieceX-1, pieceY)) { pieceX--; drawBoard(); } }
      if (e.key === 'ArrowRight') { if (!collides(piece, pieceX+1, pieceY)) { pieceX++; drawBoard(); } }
      if (e.key === 'ArrowDown')  { drop(); resetTimer(); }
      if (e.key === 'ArrowUp' || e.key === ' ') {
        e.preventDefault();
        tryRotate();
      }
    });

    // ── Touch / Swipe ───────────────────────────────────────────────────
    let touchStartX = null, touchStartY = null;
    const SWIPE_THRESHOLD = 30;

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);

      if (!started) { startGame(); touchStartX = null; return; }
      if (!running)  { touchStartX = null; return; }

      if (absDx < SWIPE_THRESHOLD && absDy < SWIPE_THRESHOLD) {
        // Kurzes Antippen → Drehen
        tryRotate();
      } else if (absDx >= absDy) {
        // Horizontal wischen → links / rechts
        if (dx < 0) { if (!collides(piece, pieceX-1, pieceY)) { pieceX--; drawBoard(); } }
        else         { if (!collides(piece, pieceX+1, pieceY)) { pieceX++; drawBoard(); } }
      } else {
        // Vertikal wischen
        if (dy > 0) { hardDrop(); resetTimer(); }  // nach unten → fallen lassen
        else        { tryRotate(); }               // nach oben → drehen
      }

      touchStartX = null;
    }, { passive: false });

    board = newBoard(); piece = PIECES[0]; pieceX = 4; pieceY = 0;
    drawBoard();
  </script>
</body>
</html>
